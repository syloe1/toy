services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: "Asia/Shanghai"
      SERVER_PORT: "8080"
      DATABASE_DSN: "root:123456@tcp(mysql:3306)/todolist?charset=utf8mb4&parseTime=True&loc=Local"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USERNAME: "your_email@example.com"
      SMTP_PASSWORD: "your_smtp_password"
      SMTP_FROM: "your_email@example.com"
      REMINDER_RECIPIENTS: "todo_owner@example.com"
      REMINDER_CRON_SPEC: "0 8 * * *"
      REMINDER_TIMEZONE: "Asia/Shanghai"
    ports:
      - "8080:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "todolist"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
